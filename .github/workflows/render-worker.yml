name: LyricForge Cloud Render Worker
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Render job ID from Supabase'
        required: true
        type: string
  schedule:
    - cron: '*/10 * * * *'  # every 10 min, pick up pending jobs

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://nldebawdjbiktuefhihr.supabase.co' }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Chromium + deps
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2 libegl1

      - name: Install Node deps
        run: |
          npm init -y
          npm install puppeteer @supabase/supabase-js ffmpeg-static fluent-ffmpeg

      - name: Process render jobs
        env:
          RENDER_JOB_ID: ${{ inputs.job_id || '' }}
        run: |
          if [ -z "$RENDER_JOB_ID" ]; then
            echo "No specific job ID — checking for pending jobs..."
            node -e "
              const { createClient } = require('@supabase/supabase-js');
              const sb = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_KEY);
              sb.from('render_jobs').select('id').eq('status', 'pending').order('created_at', { ascending: true }).limit(1).then(({data}) => {
                if (data && data.length > 0) {
                  console.log('PENDING_JOB_ID=' + data[0].id);
                } else {
                  console.log('No pending jobs');
                }
              });
            " > /tmp/job_output.txt
            cat /tmp/job_output.txt
            source /tmp/job_output.txt
            if [ -n "$PENDING_JOB_ID" ]; then
              echo "Processing job: $PENDING_JOB_ID"
              RENDER_JOB_ID=$PENDING_JOB_ID node scripts/cloud-render.js
            fi
          else
            node scripts/cloud-render.js
          fi

      - name: Upload render log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: render-log
          path: /tmp/*.log
          retention-days: 1
